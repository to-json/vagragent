---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  apt:
    name:
      - curl
      - wget
      - git
      - unzip
      - build-essential
      - pkg-config
      - libssl-dev
      - ca-certificates
      - gnupg
    state: present
